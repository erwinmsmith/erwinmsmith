name: Generate Snake

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-white.svg?palette=github-light

      - name: Add white SVG background
        run: |
          sed -i 's|<desc>|<rect x="-16" y="-32" width="880" height="192" fill="#ffffff"/><desc>|' dist/github-contribution-grid-snake-white.svg

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh README image cache key
        run: |
          stamp="$(date -u +%Y%m%d%H%M%S)"
          perl -0pi -e 's|github-contribution-grid-snake-white\.svg(?:\?v=\d+)?|github-contribution-grid-snake-white.svg?v='"$stamp"'|g' README.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "Refresh contribution snake cache [skip ci]"
            git push origin HEAD:main
          fi
